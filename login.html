        <link rel="stylesheet" href="estilos/logines.css">

    <body>

            <form action="">

                <i class="bx bxs-lock-alt"></i>
                </div>

                <label><input type="checkbox"> recordarme </label>
                <a href="#">Perdi mi contraseña?</a>
                </div>

                    <p> no tienes una cuenta? <a href="">registrarse</a></p>

                </div>
            </form>

        </div>
</html>
