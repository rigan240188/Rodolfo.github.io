<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <!--meta adaptar el sitio a pantallas de diferentes dispositivos -->
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0,
    maximum-scale=1.0, minimum-scale=1.0">
    <title>Animaciones de Texto e Imagenes</title>
<!--Se vincula a la Hoja de Estilo Animate.css que se encuentra en el sitio del Autor --> 
<!--<link rel="stylesheet "href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>-->

<!--Se vincula de manera local-->
<link rel="stylesheet" type="text/css" href="animate.css">
</head>
<body>
    <div>
    <h1 class="animate___animated animate__bounceIn animate_infinite infinite" > Animación CSS</h1>
    </div>
    <div class="animate___animated animate_fadeInTopRight animate_infinite infinite" >
        <a href="https://www.GOOGLE.com">GOOGLE</a>
    </div>
    <div class="animate_animated animate___zoomInUp animate_repeat-2"> 
        <img src="imagenes/bosque.jpg" width="600" height="350">
    </div>
</body>
</html>
